<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영화관 자리 예매 연습</title>
<style>
:root{
  --surface-2:#ffffff; --surface-1:#f4f2ed; --surface-0:#eeece5;
  --text-primary:#1f1f1d; --text-secondary:#5f5e5a; --text-muted:#8a8880; --text-disabled:#b4b2a9;
  --border:#ddd9cf; --border-strong:#c7c2b6; --border-stronger:#a8a297;
  --bg-accent:#e6f7f2; --fill-accent:#22c39a; --border-accent:#0f8a68; --text-accent:#0a5a44; --on-accent:#ffffff;
  --bg-success:#eaf3de; --border-success:#3b6d11; --text-success:#27500a;
  --bg-danger:#fcebeb; --border-danger:#a32d2d; --text-danger:#791f1f;
  --bg-warning:#faeeda; --border-warning:#854f0b; --text-warning:#633806;
  --bg-disabled:#e8b76b;
  --screen-bg:#0e0e0f;
  --radius:8px;
}
*{box-sizing:border-box;}
body{
  margin:0; padding:1.25rem 1rem 2rem; background:var(--surface-0);
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
  color:var(--text-primary);
  display:flex; justify-content:center;
}
.wrap{width:100%; max-width:820px;}
.sro{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
button{font-family:inherit;}

/* 상단 헤더 (영화예매 바) */
.appbar{
  background:var(--fill-accent); color:#fff;
  padding:14px 18px; border-radius:var(--radius) var(--radius) 0 0;
  display:flex; align-items:center; justify-content:space-between;
  font-size:18px; font-weight:700; margin-bottom:0;
}
.appbar .reset{
  background:rgba(255,255,255,0.15); color:#fff;
  border:1px solid rgba(255,255,255,0.4);
  padding:6px 12px; border-radius:6px; font-size:13px; cursor:pointer;
}
.card{
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:0 0 var(--radius) var(--radius); padding:1.5rem 1.25rem;
  margin-bottom:1.5rem;
}

/* 탭 */
.tabs{display:flex;gap:8px;margin-bottom:1rem;}
.tabbtn{flex:1;padding:12px;font-size:15px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;color:var(--text-primary)}
.tabbtn.active{background:var(--bg-accent);color:var(--text-accent);border:2px solid var(--border-accent)}

/* 단계 표시 */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.stepdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:var(--surface-1);color:var(--text-secondary);border:1px solid var(--border-strong)}
.stepdot.active{background:var(--fill-accent);color:var(--on-accent);border:1px solid var(--fill-accent)}
.stepdot.done{background:var(--bg-success);color:var(--text-success);border:1px solid var(--border-success)}
.stepline{width:28px;height:2px;background:var(--border-strong);}
.stepline.done{background:var(--border-success);}
.steplabel{font-size:12px;color:var(--text-secondary);margin-left:2px;margin-right:2px;}
.steplabel.active{color:var(--fill-accent);font-weight:700;}

/* 영화 카드 */
.movieGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media (min-width:640px){.movieGrid{grid-template-columns:repeat(4,1fr);}}
.movieCard{
  background:var(--surface-2); border:2px solid var(--border);
  border-radius:var(--radius); overflow:hidden; cursor:pointer;
  display:flex; flex-direction:column; text-align:left;
  padding:0; font-family:inherit;
}
.movieCard:hover{border-color:var(--fill-accent);}
.movieCard.sel{border:2px solid var(--fill-accent); background:var(--bg-accent);}
.poster{
  aspect-ratio: 3/4; width:100%;
  background-color:#1c1b19; background-size:cover; background-position:center;
  display:block;
}
.poster img{width:100%; height:100%; object-fit:cover; display:block;}
.movieCard .info{padding:10px 12px;}
.movieCard .title{font-size:14px;font-weight:700;color:var(--text-primary);margin:0 0 4px;}
.movieCard .date{font-size:12px;color:var(--text-secondary);margin:0;}

/* 인원 선택 */
.countbtn{width:48px;height:48px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface-2);font-size:18px;font-weight:600;color:var(--text-primary);cursor:pointer;padding:0;}
.countbtn.sel{background:var(--fill-accent);color:var(--on-accent);border:1px solid var(--fill-accent)}

/* 좌석 */
.screenBar{
  width:100%; max-width:560px; margin:0 auto 20px;
  background:var(--screen-bg); color:#fff;
  padding:10px 0; border-radius:2px 2px 60px 60px;
  text-align:center; font-size:13px; letter-spacing:8px;
}
.seatWrap{background:var(--screen-bg); padding:18px 8px; border-radius:var(--radius); margin-bottom:12px; overflow-x:auto;}
.seatRow{display:flex;gap:4px;align-items:center;justify-content:center;margin-bottom:4px;}
.rowLabel{width:18px;font-size:13px;font-weight:700;color:#c9c9c9;text-align:center;}
.aisle{width:14px;}
.seat{width:26px;height:26px;border-radius:5px 5px 2px 2px;border:1px solid transparent;background:#d5d3cc;font-size:10px;font-weight:600;color:#5a5a5a;cursor:pointer;padding:0;}
.seat:hover:not(.reserved):not(.disabled){background:#22c39a;color:#fff;}
.seat.sel{background:var(--fill-accent);color:#fff;}
.seat.reserved{background:#4a4a4c;color:#8a8a8a;cursor:not-allowed;}
.seat.disabled{background:var(--bg-disabled);color:#fff;cursor:not-allowed;}
.legend{display:flex;gap:14px;justify-content:center;font-size:12px;color:#c9c9c9;flex-wrap:wrap;margin-top:10px;}
.legenddot{width:14px;height:14px;border-radius:3px;display:inline-block;vertical-align:-2px;margin-right:5px}

.selBar{
  background:var(--screen-bg); color:#fff;
  padding:12px; border-radius:var(--radius); margin-bottom:12px;
}
.selBar .lbl{font-size:12px;color:#c9c9c9;margin-bottom:6px;}
.selBar .slots{display:flex;gap:6px;flex-wrap:wrap;}
.slot{
  min-width:44px;height:32px;border-radius:5px;background:#3a3a3c;color:#c9c9c9;
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
}
.slot.on{background:var(--fill-accent);color:#fff;}

/* 확인 화면 */
.confirmBox{background:var(--surface-1);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.chip{min-width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;padding:0 10px;border-radius:var(--radius);background:var(--surface-2);border:1px solid var(--border);font-size:14px;font-weight:600;color:var(--text-secondary)}
.chip.on{background:var(--bg-accent);color:var(--text-accent);border:2px solid var(--border-accent)}
.chip.big{min-width:44px;height:44px;font-size:18px;}
.readAloud{font-size:20px;font-weight:700;color:var(--text-accent);text-align:center;margin:12px 0;padding:12px;background:var(--bg-accent);border-radius:var(--radius);}

/* 액션 버튼 */
.actions{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.btn{padding:14px 20px;font-size:15px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;color:var(--text-primary);flex:1;max-width:200px;}
.btn.primary{background:var(--fill-accent);color:#fff;border:1px solid var(--fill-accent);}
.btn.primary:disabled{background:var(--border-strong);border-color:var(--border-strong);color:#fff;cursor:not-allowed;}

/* 퀴즈 */
.optbtn{flex:1;padding:18px;font-size:22px;font-weight:700;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;color:var(--text-primary)}
.optbtn.correct{background:var(--bg-success);border:2px solid var(--border-success);color:var(--text-success)}
.optbtn.wrong{background:var(--bg-danger);border:2px solid var(--border-danger);color:var(--text-danger)}
.quizGrid{display:flex;gap:6px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.qType{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.qTypeBtn{padding:8px 14px;font-size:13px;border-radius:20px;border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;color:var(--text-secondary);}
.qTypeBtn.on{background:var(--bg-accent);color:var(--text-accent);border:2px solid var(--border-accent);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">

<h2 class="sro">영화관 예매 연습 - 영화 고르기, 자리 고르기, 자리 번호 읽기</h2>

<div class="tabs">
  <button id="tabBook" class="tabbtn active">영화관 예매하기</button>
  <button id="tabQuiz" class="tabbtn">규칙 찾기 게임</button>
</div>

<div id="panelBook">
  <div class="appbar">
    <span>영화예매</span>
    <button class="reset" id="resetBtn">↺ 예매 다시하기</button>
  </div>
  <div class="card">

    <!-- 단계 표시 -->
    <div class="steps">
      <div class="stepdot active" id="dot1">1</div>
      <span class="steplabel active" id="lbl1">영화 고르기</span>
      <div class="stepline" id="line1"></div>
      <div class="stepdot" id="dot2">2</div>
      <span class="steplabel" id="lbl2">인원 정하기</span>
      <div class="stepline" id="line2"></div>
      <div class="stepdot" id="dot3">3</div>
      <span class="steplabel" id="lbl3">자리 고르기</span>
      <div class="stepline" id="line3"></div>
      <div class="stepdot" id="dot4">4</div>
      <span class="steplabel" id="lbl4">예매 확인</span>
    </div>

    <!-- Step 1: 영화 고르기 -->
    <div id="stepMovie">
      <p style="text-align:center;font-size:16px;color:var(--text-secondary);margin:0 0 1.25rem;">어떤 영화를 볼까요?</p>
      <div class="movieGrid" id="movieGrid"></div>
    </div>

    <!-- Step 2: 인원 정하기 -->
    <div id="stepCount" style="display:none;">
      <p style="text-align:center;font-size:16px;color:var(--text-secondary);margin:0 0 1.25rem;">몇 명이 영화를 보러 가나요?</p>
      <div style="max-width:520px;margin:0 auto;">
        <div style="margin-bottom:1rem;">
          <p style="font-size:15px;font-weight:700;color:var(--text-primary);margin:0 0 8px;">성인 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">(만 19세 이상)</span></p>
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="adultBtns"></div>
        </div>
        <div style="margin-bottom:1rem;">
          <p style="font-size:15px;font-weight:700;color:var(--text-primary);margin:0 0 8px;">청소년 <span style="font-size:12px;font-weight:400;color:var(--text-muted);">(만 13~18세)</span></p>
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="youthBtns"></div>
        </div>
      </div>
      <p id="countHint" style="text-align:center;font-size:15px;font-weight:600;color:var(--text-accent);margin:0;min-height:22px;"></p>
    </div>

    <!-- Step 3: 자리 고르기 -->
    <div id="stepSeat" style="display:none;">
      <p style="text-align:center;font-size:15px;color:var(--text-secondary);margin:0 0 1rem;">
        가로줄은 <b style="color:var(--text-accent);">열(A~F)</b>, 세로줄은 <b style="color:var(--text-accent);">번호(1~14)</b>예요.
      </p>
      <div class="seatWrap">
        <div style="text-align:center;">
          <div class="screenBar">SCREEN</div>
        </div>
        <div id="seatGrid"></div>
        <div class="legend">
          <span><span class="legenddot" style="background:#d5d3cc;"></span>선택 가능</span>
          <span><span class="legenddot" style="background:var(--fill-accent);"></span>내가 고른 자리</span>
          <span><span class="legenddot" style="background:#4a4a4c;"></span>예약된 자리</span>
          <span><span class="legenddot" style="background:var(--bg-disabled);"></span>장애인석</span>
        </div>
      </div>
      <div class="selBar">
        <div class="lbl">선택 좌석</div>
        <div class="slots" id="selSlots"></div>
      </div>
      <p style="text-align:center;font-size:14px;font-weight:600;margin:0;" id="seatStatus"></p>
    </div>

    <!-- Step 4: 예매 확인 -->
    <div id="stepConfirm" style="display:none;">
      <div class="confirmBox">
        <p style="font-size:13px;color:var(--text-secondary);margin:0 0 6px;">고른 영화</p>
        <div style="display:flex;align-items:center;gap:12px;margin:0 0 14px;">
          <img id="confirmPoster" alt="" style="width:56px;height:auto;aspect-ratio:3/4;object-fit:cover;border-radius:6px;background:#1c1b19;display:none;">
          <p id="confirmMovie" style="font-size:18px;font-weight:700;margin:0;"></p>
        </div>

        <p style="font-size:13px;color:var(--text-secondary);margin:0 0 6px;">고른 자리</p>
        <div id="confirmSeats" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;"></div>

        <div class="readAloud" id="readAloud"></div>

        <p style="font-size:13px;color:var(--text-secondary);margin:14px 0 6px;">자리 번호 규칙 살펴보기</p>
        <div id="confirmPattern" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>
      <p id="confirmMsg" style="text-align:center;font-size:16px;font-weight:600;color:var(--text-success);min-height:24px;"></p>
    </div>

    <div class="actions">
      <button id="backBtn" class="btn" style="display:none;">이전</button>
      <button id="nextStepBtn" class="btn primary">다음</button>
    </div>
  </div>
</div>

<div id="panelQuiz" style="display:none">
  <div class="appbar">
    <span>규칙 찾기 게임</span>
    <span id="scoreChip" style="font-size:14px;">맞은 문제 0 / 0</span>
  </div>
  <div class="card">
    <div class="qType">
      <button class="qTypeBtn on" data-type="row">같은 열에서 옆으로 (→ 1씩 커져요)</button>
      <button class="qTypeBtn" data-type="col">같은 번호에서 아래로 (↓ A→B→C→D→E)</button>
    </div>
    <p id="quizRowLabel" style="font-size:16px;color:var(--text-secondary);margin:0 0 12px;text-align:center;"></p>
    <div id="quizRow" class="quizGrid"></div>
    <p style="font-size:15px;color:var(--text-secondary);text-align:center;margin:0 0 12px;">빈 자리에 들어갈 것은 무엇일까요?</p>
    <div id="quizOptions" style="display:flex;gap:10px;margin-bottom:1rem;"></div>
    <p id="quizFeedback" style="text-align:center;font-size:16px;font-weight:600;min-height:24px;margin:0 0 1rem;"></p>
    <div style="text-align:center;">
      <button id="nextQuizBtn" class="btn primary" style="max-width:200px;">다음 문제 →</button>
    </div>
  </div>
</div>

</div>

<script>
(function(){
  // ========= 데이터 =========
  var movies = [
    {id:1, title:'충충충', date:'2026.06.17 개봉', posterUrl:'https://images.wrks.ai/dalle/2mRKPAbGZvhVCakQenendGeyqKOcBFV41VWGlyuh.png'},
    {id:2, title:'현재를 위하여', date:'2026.06.17 개봉', posterUrl:'https://images.wrks.ai/dalle/BM56YdMKinpF8As5wjrvoSKuvGxH5Qj6rBlFAXUP.png'},
    {id:3, title:'토이 스토리 5', date:'2026.06.17 개봉', posterUrl:'https://images.wrks.ai/dalle/ZLNek0IlTkdcfZV35zAAA2fVJAclUgv9vudaNnDU.png'},
    {id:4, title:'이반리 장만옥', date:'2026.06.10 개봉', posterUrl:'https://images.wrks.ai/dalle/9W4ahP1FBoaaoDcg0QngKWYdWNqcdyqrxOdU6lqE.png'}
  ];
  // 좌석: A~E열은 일반석 14석 (가운데 7-8 사이 통로), F열은 장애인석 4석만
  var rows = ['A','B','C','D','E','F'];
  var seatsPerRow = 14;
  // F열은 특수 처리: 양끝 4석만 장애인석, 나머지는 없음
  var reserved = {
    "B-3":1,"B-4":1,
    "C-8":1,"C-9":1,
    "D-2":1,
    "E-11":1,"E-12":1,
    "A-13":1
  };
  var disabled = {
    "F-1":1,"F-2":1,"F-13":1,"F-14":1
  };
  // F열에서 좌석이 아예 없는 위치(빈칸 표시)
  var noSeat = {
    "F-3":1,"F-4":1,"F-5":1,"F-6":1,"F-7":1,"F-8":1,"F-9":1,"F-10":1,"F-11":1,"F-12":1
  };

  var selectedMovie = null;
  var ticketCount = 0;
  var selected = [];
  var step = 1;

  // ========= Step 1: 영화 카드 =========
  var movieGrid = document.getElementById('movieGrid');
  movies.forEach(function(m){
    var card = document.createElement('button');
    card.className = 'movieCard';
    card.setAttribute('data-id', m.id);
    card.innerHTML =
      '<div class="poster"><img src="' + m.posterUrl + '" alt="' + m.title + ' 포스터" loading="lazy"></div>' +
      '<div class="info"><p class="title">' + m.title + '</p><p class="date">' + m.date + '</p></div>';
    card.onclick = function(){
      selectedMovie = m;
      document.querySelectorAll('.movieCard').forEach(function(x){ x.classList.remove('sel'); });
      card.classList.add('sel');
      updateNextBtn();
    };
    movieGrid.appendChild(card);
  });

  // ========= Step 2: 인원 버튼 (성인/청소년 분리) =========
  var adultCount = 0, youthCount = 0;
  function makeCountRow(containerId, group){
    var container = document.getElementById(containerId);
    for (var i = 0; i <= 8; i++){
      (function(n){
        var b = document.createElement('button');
        b.className = 'countbtn';
        b.setAttribute('data-group', group);
        b.setAttribute('data-n', n);
        b.textContent = n;
        if (n === 0) b.classList.add('sel');
        b.onclick = function(){
          container.querySelectorAll('.countbtn').forEach(function(x){ x.classList.remove('sel'); });
          b.classList.add('sel');
          if (group === 'adult') adultCount = n;
          else youthCount = n;
          ticketCount = adultCount + youthCount;
          // 이미 고른 좌석은 새 인원 수에 맞게 초기화
          selected = [];
          document.querySelectorAll('.seat.sel').forEach(function(s){ s.classList.remove('sel'); });
          updateCountHint();
          updateNextBtn();
        };
        container.appendChild(b);
      })(i);
    }
  }
  makeCountRow('adultBtns', 'adult');
  makeCountRow('youthBtns', 'youth');

  function updateCountHint(){
    var hint = document.getElementById('countHint');
    if (ticketCount === 0){
      hint.textContent = '';
      return;
    }
    var parts = [];
    if (adultCount > 0) parts.push('성인 ' + adultCount + '명');
    if (youthCount > 0) parts.push('청소년 ' + youthCount + '명');
    hint.textContent = parts.join(', ') + ' — 모두 ' + ticketCount + '명이 봐요. 자리를 ' + ticketCount + '개 골라요.';
  }

  // ========= Step 3: 좌석 =========
  var seatGrid = document.getElementById('seatGrid');
  rows.forEach(function(r){
    var rowDiv = document.createElement('div');
    rowDiv.className = 'seatRow';
    var labelL = document.createElement('span');
    labelL.className = 'rowLabel';
    labelL.textContent = r;
    rowDiv.appendChild(labelL);
    for (var n = 1; n <= seatsPerRow; n++){
      var key = r + '-' + n;
      if (noSeat[key]){
        var gap = document.createElement('span');
        gap.style.width = '26px';
        gap.style.height = '26px';
        gap.style.display = 'inline-block';
        rowDiv.appendChild(gap);
      } else {
        var btn = document.createElement('button');
        var cls = 'seat';
        if (reserved[key]) cls += ' reserved';
        else if (disabled[key]) cls += ' disabled';
        btn.className = cls;
        btn.textContent = n;
        btn.setAttribute('data-key', key);
        btn.setAttribute('data-row', r);
        btn.setAttribute('data-num', n);
        btn.setAttribute('aria-label', r + '열 ' + n + '번');
        btn.onclick = (function(key, row, num, el){
          return function(){
            if (el.classList.contains('reserved') || el.classList.contains('disabled')) return;
            var idx = selected.findIndex(function(s){ return s.key === key; });
            if (idx >= 0){
              selected.splice(idx, 1);
              el.classList.remove('sel');
            } else {
              if (ticketCount === 0){ flashStatus('먼저 인원을 골라주세요.'); return; }
              if (selected.length >= ticketCount){
                flashStatus('자리를 이미 ' + ticketCount + '개 골랐어요. 취소하려면 고른 자리를 다시 눌러요.');
                return;
              }
              selected.push({ key: key, row: row, num: num });
              el.classList.add('sel');
            }
            updateSeatStatus();
            renderSelSlots();
            updateNextBtn();
          };
        })(key, r, n, btn);
        rowDiv.appendChild(btn);
      }
      // 7번과 8번 사이 통로 (가운데 통로)
      if (n === 7){
        var aisle = document.createElement('span');
        aisle.className = 'aisle';
        rowDiv.appendChild(aisle);
      }
    }
    var labelR = document.createElement('span');
    labelR.className = 'rowLabel';
    labelR.textContent = r;
    rowDiv.appendChild(labelR);
    seatGrid.appendChild(rowDiv);
  });

  function renderSelSlots(){
    var slots = document.getElementById('selSlots');
    slots.innerHTML = '';
    var sorted = selected.slice().sort(function(a,b){ return a.row === b.row ? a.num - b.num : a.row.localeCompare(b.row); });
    var max = Math.max(ticketCount, 1);
    for (var i = 0; i < max; i++){
      var s = document.createElement('span');
      if (sorted[i]){
        s.className = 'slot on';
        s.textContent = sorted[i].row + sorted[i].num;
      } else {
        s.className = 'slot';
        s.textContent = '-';
      }
      slots.appendChild(s);
    }
  }

  function flashStatus(msg){
    var s = document.getElementById('seatStatus');
    s.textContent = msg;
    s.style.color = 'var(--text-danger)';
  }
  function updateSeatStatus(){
    var s = document.getElementById('seatStatus');
    s.style.color = 'var(--text-secondary)';
    s.textContent = '자리 ' + selected.length + ' / ' + ticketCount + ' 개 골랐어요';
  }

  // ========= 단계 이동 =========
  var stepEls = {
    1: document.getElementById('stepMovie'),
    2: document.getElementById('stepCount'),
    3: document.getElementById('stepSeat'),
    4: document.getElementById('stepConfirm')
  };
  var dots = [null,
    document.getElementById('dot1'),
    document.getElementById('dot2'),
    document.getElementById('dot3'),
    document.getElementById('dot4')
  ];
  var lbls = [null,
    document.getElementById('lbl1'),
    document.getElementById('lbl2'),
    document.getElementById('lbl3'),
    document.getElementById('lbl4')
  ];
  var lines = [null,
    document.getElementById('line1'),
    document.getElementById('line2'),
    document.getElementById('line3')
  ];
  var nextStepBtn = document.getElementById('nextStepBtn');
  var backBtn = document.getElementById('backBtn');

  function updateNextBtn(){
    var ok = false;
    if (step === 1) ok = !!selectedMovie;
    else if (step === 2) ok = ticketCount > 0;
    else if (step === 3) ok = selected.length === ticketCount && ticketCount > 0;
    else if (step === 4) ok = true;
    nextStepBtn.disabled = !ok;
  }

  function goToStep(n){
    step = n;
    for (var i = 1; i <= 4; i++){
      dots[i].className = 'stepdot' + (i < n ? ' done' : (i === n ? ' active' : ''));
      lbls[i].className = 'steplabel' + (i === n ? ' active' : '');
      stepEls[i].style.display = i === n ? '' : 'none';
    }
    for (var j = 1; j <= 3; j++){
      lines[j].className = 'stepline' + (j < n ? ' done' : '');
    }
    backBtn.style.display = n === 1 ? 'none' : '';
    if (n === 1) nextStepBtn.textContent = '인원 정하기 →';
    if (n === 2){ nextStepBtn.textContent = '자리 고르기 →'; }
    if (n === 3){ nextStepBtn.textContent = '예매 확인 →'; updateSeatStatus(); renderSelSlots(); }
    if (n === 4){ nextStepBtn.textContent = '예매 완료'; renderConfirm(); document.getElementById('confirmMsg').textContent = ''; }
    updateNextBtn();
  }

  function renderConfirm(){
    document.getElementById('confirmMovie').textContent = selectedMovie ? selectedMovie.title : '';
    var confirmPoster = document.getElementById('confirmPoster');
    if (selectedMovie && selectedMovie.posterUrl){
      confirmPoster.src = selectedMovie.posterUrl;
      confirmPoster.alt = selectedMovie.title + ' 포스터';
      confirmPoster.style.display = 'block';
    } else {
      confirmPoster.style.display = 'none';
    }

    var seatsDiv = document.getElementById('confirmSeats');
    seatsDiv.innerHTML = '';
    var sorted = selected.slice().sort(function(a,b){ return a.row === b.row ? a.num - b.num : a.row.localeCompare(b.row); });
    sorted.forEach(function(s){
      var chip = document.createElement('span');
      chip.className = 'chip on big';
      chip.textContent = s.row + '열 ' + s.num + '번';
      seatsDiv.appendChild(chip);
    });

    // 소리 내어 읽기 안내
    var readEl = document.getElementById('readAloud');
    if (sorted.length > 0){
      var readTexts = sorted.map(function(s){ return '"' + s.row + '열 ' + s.num + '번"'; });
      readEl.innerHTML = '소리 내어 읽어 볼까요<br>' + readTexts.join(', ');
    } else {
      readEl.textContent = '';
    }

    // 규칙 시각화 (같은 열끼리 모아서 표시)
    var byRow = {};
    selected.forEach(function(s){
      if (!byRow[s.row]) byRow[s.row] = [];
      byRow[s.row].push(s.num);
    });
    var patternDiv = document.getElementById('confirmPattern');
    patternDiv.innerHTML = '';
    Object.keys(byRow).sort().forEach(function(r){
      var nums = byRow[r].sort(function(a,b){return a-b;});
      var minN = Math.max(1, nums[0] - 1);
      var maxN = Math.min(seatsPerRow, nums[nums.length - 1] + 1);
      var line = document.createElement('div');
      line.style.display = 'flex';
      line.style.gap = '6px';
      line.style.alignItems = 'center';
      line.style.flexWrap = 'wrap';
      var rl = document.createElement('span');
      rl.style.fontSize = '14px';
      rl.style.fontWeight = '700';
      rl.style.color = 'var(--text-primary)';
      rl.style.width = '36px';
      rl.textContent = r + '열';
      line.appendChild(rl);
      for (var i = minN; i <= maxN; i++){
        var chip = document.createElement('span');
        chip.className = 'chip' + (nums.indexOf(i) >= 0 ? ' on' : '');
        chip.textContent = i;
        line.appendChild(chip);
        if (i < maxN){
          var arrow = document.createElement('span');
          arrow.style.fontSize = '12px';
          arrow.style.color = 'var(--text-muted)';
          arrow.textContent = '+1';
          line.appendChild(arrow);
        }
      }
      patternDiv.appendChild(line);
    });
    var note = document.createElement('p');
    note.style.fontSize = '13px';
    note.style.color = 'var(--text-secondary)';
    note.style.margin = '4px 0 0';
    note.textContent = '옆으로 한 자리씩 갈수록 번호가 1씩 커져요. (규칙: +1)';
    patternDiv.appendChild(note);
  }

  nextStepBtn.onclick = function(){
    if (nextStepBtn.disabled) return;
    if (step === 1){ goToStep(2); }
    else if (step === 2){ goToStep(3); }
    else if (step === 3){ goToStep(4); }
    else if (step === 4){
      document.getElementById('confirmMsg').textContent = '예매가 완료되었어요. 영화관에서 만나요!';
    }
  };
  backBtn.onclick = function(){
    if (step > 1) goToStep(step - 1);
  };

  document.getElementById('resetBtn').onclick = function(){
    selectedMovie = null; ticketCount = 0; adultCount = 0; youthCount = 0; selected = [];
    document.querySelectorAll('.movieCard').forEach(function(x){ x.classList.remove('sel'); });
    document.querySelectorAll('.countbtn').forEach(function(x){ x.classList.remove('sel'); });
    // 0번 버튼을 다시 sel 상태로
    document.querySelectorAll('.countbtn[data-n="0"]').forEach(function(x){ x.classList.add('sel'); });
    document.querySelectorAll('.seat.sel').forEach(function(x){ x.classList.remove('sel'); });
    document.getElementById('countHint').textContent = '';
    goToStep(1);
  };

  // ========= 탭 =========
  var tabBook = document.getElementById('tabBook');
  var tabQuiz = document.getElementById('tabQuiz');
  var panelBook = document.getElementById('panelBook');
  var panelQuiz = document.getElementById('panelQuiz');
  tabBook.onclick = function(){
    tabBook.classList.add('active'); tabQuiz.classList.remove('active');
    panelBook.style.display = ''; panelQuiz.style.display = 'none';
  };
  tabQuiz.onclick = function(){
    tabQuiz.classList.add('active'); tabBook.classList.remove('active');
    panelQuiz.style.display = ''; panelBook.style.display = 'none';
  };

  // ========= 퀴즈 =========
  var correctCount = 0, totalCount = 0, currentAnswer = null, answered = false;
  var quizType = 'row'; // 'row' 또는 'col'

  document.querySelectorAll('.qTypeBtn').forEach(function(b){
    b.onclick = function(){
      document.querySelectorAll('.qTypeBtn').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      quizType = b.getAttribute('data-type');
      newQuiz();
    };
  });

  function updateScore(){
    document.getElementById('scoreChip').textContent = '맞은 문제 ' + correctCount + ' / ' + totalCount;
  }

  function newQuiz(){
    answered = false;
    document.getElementById('quizFeedback').textContent = '';
    var quizRow = document.getElementById('quizRow');
    quizRow.innerHTML = '';
    var optDiv = document.getElementById('quizOptions');
    optDiv.innerHTML = '';
    var options;

    if (quizType === 'row'){
      // 같은 열의 번호 규칙 (1씩 커짐)
      var quizRowsForRow = rows.slice(0, 5);
      var row = quizRowsForRow[Math.floor(Math.random() * quizRowsForRow.length)];
      var blankPos = 2 + Math.floor(Math.random() * (seatsPerRow - 2));
      currentAnswer = blankPos;
      document.getElementById('quizRowLabel').innerHTML = '<b>' + row + '열</b>의 자리 번호예요';
      for (var i = 1; i <= seatsPerRow; i++){
        var chip = document.createElement('span');
        chip.className = 'chip big';
        if (i === blankPos){
          chip.textContent = '?';
          chip.style.background = 'var(--bg-warning)';
          chip.style.borderColor = 'var(--border-warning)';
          chip.style.color = 'var(--text-warning)';
        } else {
          chip.textContent = i;
        }
        quizRow.appendChild(chip);
      }
      options = [blankPos - 1, blankPos, blankPos + 1].filter(function(x){ return x >= 1 && x <= seatsPerRow; });
      while (options.length < 3){ options.push(options[options.length - 1] + 1); }
      options = options.slice(0,3).sort(function(){ return Math.random() - 0.5; });
    } else {
      // 같은 번호의 열 규칙 (A, B, C, D, E 순)
      // F열은 장애인석 특수행이므로 퀴즈에서는 A~E만 사용
      var quizRows = rows.slice(0, 5);
      var num = 1 + Math.floor(Math.random() * seatsPerRow);
      var blankIdx = 1 + Math.floor(Math.random() * (quizRows.length - 2));
      currentAnswer = quizRows[blankIdx];
      document.getElementById('quizRowLabel').innerHTML = '자리 번호 <b>' + num + '번</b>을 위에서 아래로 봐요';
      quizRows.forEach(function(r, idx){
        var chip = document.createElement('span');
        chip.className = 'chip big';
        if (idx === blankIdx){
          chip.textContent = '?';
          chip.style.background = 'var(--bg-warning)';
          chip.style.borderColor = 'var(--border-warning)';
          chip.style.color = 'var(--text-warning)';
        } else {
          chip.textContent = r + num;
        }
        quizRow.appendChild(chip);
      });
      var others = quizRows.filter(function(r){ return r !== currentAnswer; });
      others.sort(function(){ return Math.random() - 0.5; });
      options = [currentAnswer, others[0], others[1]].sort(function(){ return Math.random() - 0.5; });
    }

    options.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'optbtn';
      btn.textContent = opt;
      btn.onclick = function(){
        if (answered) return;
        answered = true;
        totalCount++;
        var val = quizType === 'row' ? parseInt(btn.textContent, 10) : btn.textContent;
        if (val === currentAnswer){
          btn.classList.add('correct');
          correctCount++;
          var msg = quizType === 'row' ? '정답이에요! 1씩 커지는 규칙이 맞아요.' : '정답이에요! A, B, C, D, E 순서로 내려가요.';
          document.getElementById('quizFeedback').textContent = msg;
          document.getElementById('quizFeedback').style.color = 'var(--text-success)';
        } else {
          btn.classList.add('wrong');
          document.getElementById('quizFeedback').textContent = '다시 생각해 볼까요? 정답은 ' + currentAnswer + '이에요.';
          document.getElementById('quizFeedback').style.color = 'var(--text-danger)';
        }
        updateScore();
      };
      optDiv.appendChild(btn);
    });
  }
  document.getElementById('nextQuizBtn').onclick = newQuiz;
  newQuiz();
  updateNextBtn();
})();
</script>
</body>
</html>
